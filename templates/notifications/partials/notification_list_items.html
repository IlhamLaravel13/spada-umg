{% for notification in notifications %}
  {% include 'notifications/partials/notification_item.html' with notification=notification %}
{% empty %}
<div class="text-center py-16">
  <div class="text-blue-200/50">
    <i class="fas fa-bell-slash text-5xl mb-4"></i>
    <p class="text-xl font-medium text-white">Tidak Ada Notifikasi</p>
    <p class="text-sm mt-2 text-blue-200/60">Belum ada notifikasi untuk ditampilkan.</p>
  </div>
</div>
{% endfor %}

{% if page_obj.has_next %}
<div class="text-center mt-6"
  hx-get="{% url 'notifications:list' %}?page={{ page_obj.next_page_number }}{% if selected_type %}&type={{ selected_type }}{% endif %}"
  hx-trigger="intersect once"
  hx-target="#notificationList"
  hx-swap="beforeend">
  <div class="inline-flex items-center space-x-2 text-blue-300/60">
    <i class="fas fa-spinner fa-spin"></i>
    <span class="text-sm">Memuat lebih banyak...</span>
  </div>
</div>
{% endif %}
