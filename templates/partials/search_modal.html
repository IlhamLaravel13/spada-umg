<div x-show="searchOpen"
    x-cloak
    @keydown.escape.window="searchOpen = false"
    @keydown.cmd.k.window.prevent="searchOpen = true"
    @keydown.ctrl.k.window.prevent="searchOpen = true"
    class="fixed inset-0 z-[200] flex items-start justify-center pt-[15vh]"
    x-transition:enter="transition ease-out duration-200"
    x-transition:enter-start="opacity-0"
    x-transition:enter-end="opacity-100"
    x-transition:leave="transition ease-in duration-150"
    x-transition:leave-start="opacity-100"
    x-transition:leave-end="opacity-0">

    <div class="fixed inset-0 bg-black/60 backdrop-blur-sm" @click="searchOpen = false"></div>

    <div class="relative w-full max-w-2xl mx-4 bg-white dark:bg-gray-800 rounded-2xl shadow-2xl border border-gray-200 dark:border-gray-700 overflow-hidden"
        @click.outside="searchOpen = false"
        x-transition:enter="transition ease-out duration-200"
        x-transition:enter-start="opacity-0 scale-95 translate-y-4"
        x-transition:enter-end="opacity-100 scale-100 translate-y-0"
        x-transition:leave="transition ease-in duration-150"
        x-transition:leave-start="opacity-100 scale-100 translate-y-0"
        x-transition:leave-end="opacity-0 scale-95 translate-y-4">

        <div class="relative">
            <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-gray-400"></i>
            <input type="text"
                x-ref="searchInput"
                id="global-search-input"
                class="w-full pl-12 pr-12 py-4 bg-transparent border-0 border-b border-gray-200 dark:border-gray-700 text-gray-800 dark:text-white placeholder-gray-400 dark:placeholder-gray-500 focus:outline-none focus:ring-0 text-lg"
                placeholder="Cari mata kuliah, tugas, materi, atau pengguna..."
                autocomplete="off"
                hx-get="{% url 'search:global' %}"
                hx-trigger="keyup changed delay:300ms"
                hx-target="#search-results"
                hx-indicator="#search-indicator"
                @keydown.escape.window="searchOpen = false">
            <button @click="searchOpen = false" class="absolute right-4 top-1/2 -translate-y-1/2 p-1.5 rounded-lg text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
                <kbd class="hidden sm:inline-flex items-center px-2 py-0.5 rounded bg-gray-100 dark:bg-gray-700 text-xs font-mono mr-2">ESC</kbd>
                <i class="fas fa-times"></i>
            </button>
        </div>

        <div id="search-indicator" class="hidden h-1 bg-primary-500/20">
            <div class="h-full bg-primary-500 rounded-full animate-pulse" style="width: 60%;"></div>
        </div>

        <div id="search-results" class="max-h-96 overflow-y-auto p-2">
            <div class="flex items-center gap-3 px-4 py-6 text-center text-gray-400 dark:text-gray-500">
                <i class="fas fa-search text-2xl mx-auto"></i>
                <p class="text-sm">Ketik kata kunci untuk memulai pencarian...</p>
            </div>
        </div>

        <div class="px-4 py-3 bg-gray-50 dark:bg-gray-800/50 border-t border-gray-200 dark:border-gray-700 flex items-center gap-4 text-xs text-gray-400 dark:text-gray-500">
            <span class="flex items-center gap-1"><kbd class="px-1.5 py-0.5 rounded bg-gray-200 dark:bg-gray-700 font-mono">↑↓</kbd> Navigasi</span>
            <span class="flex items-center gap-1"><kbd class="px-1.5 py-0.5 rounded bg-gray-200 dark:bg-gray-700 font-mono">Enter</kbd> Pilih</span>
            <span class="flex items-center gap-1"><kbd class="px-1.5 py-0.5 rounded bg-gray-200 dark:bg-gray-700 font-mono">Esc</kbd> Tutup</span>
        </div>
    </div>
</div>
