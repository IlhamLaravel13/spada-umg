{% if important_announcements %}
<div id="importantBanner">
  {% for announcement in important_announcements %}
  <div class="bg-gradient-to-r from-red-600/80 to-red-800/80 backdrop-blur-xl border-b border-red-400/30 px-6 py-2">
    <div class="max-w-7xl mx-auto flex items-center justify-between">
      <div class="flex items-center space-x-3 min-w-0">
        <span class="flex-shrink-0 w-8 h-8 rounded-full bg-red-500/30 flex items-center justify-center">
          <i class="fas fa-bullhorn text-red-200 text-sm"></i>
        </span>
        <div class="min-w-0">
          <a href="{% url 'announcements:announcement_detail' announcement.pk %}" class="text-red-100 font-semibold text-sm hover:text-white transition-colors truncate block">
            {{ announcement.title }}
          </a>
          <p class="text-red-200/70 text-xs truncate">{{ announcement.content|truncatewords:15 }}</p>
        </div>
      </div>
      <div class="flex items-center space-x-2 flex-shrink-0">
        <a href="{% url 'announcements:announcement_detail' announcement.pk %}" class="text-xs px-3 py-1 rounded-lg bg-red-500/30 hover:bg-red-500/50 text-red-100 border border-red-400/30 transition-all">
          Lihat
        </a>
        <button hx-post="{% url 'announcements:announcement_mark_read' announcement.pk %}" hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}' hx-target="#importantBanner" hx-swap="outerHTML"
          class="text-xs px-2 py-1 rounded-lg bg-white/10 hover:bg-white/20 text-red-200 transition-all">
          <i class="fas fa-times"></i>
        </button>
      </div>
    </div>
  </div>
  {% endfor %}
</div>
{% endif %}
